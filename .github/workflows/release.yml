name: Release Plugin

on:
  push:
    tags:
      - 'v*'  # uruchamia się gdy pushнесz tag np. v1.2.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          CHANGELOG=$(awk "/## ${VERSION}/{flag=1; next} /## /{flag=0} flag" CHANGELOG.md | tr '\n' ' ')
          echo "CONTENT=${CHANGELOG}" >> $GITHUB_OUTPUT

      - name: Build WP.org zip
        run: |
          mkdir -p build/wporg-tmp
          
          rsync -a --exclude='build' --exclude='.git' --exclude='node_modules' . build/wporg-tmp/
          echo "=== PRZED ==="
          grep -n "PSTRC_Updater\|class-pstrc-updater" build/wporg-tmp/pstrc-reservation-calculator.php
          
          sed -i "/class-pstrc-updater/d" build/wporg-tmp/pstrc-reservation-calculator.php
          sed -i "/new PSTRC_Updater/,/);/d" build/wporg-tmp/pstrc-reservation-calculator.php
                    echo "=== PO ==="
          grep -n "PSTRC_Updater\|class-pstrc-updater" build/wporg-tmp/pstrc-reservation-calculator.php || echo "Brak - usunieto poprawnie"

          cd build/wporg-tmp
          zip -r ../pstrc_reservation-wporg.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "src/*" \
            --exclude "*.gitignore" \
            --exclude "tailwind.config.js" \
            --exclude "package*.json" \
            --exclude "assets/*" \
            --exclude "build/*" \
            --exclude "CLAUDE.md" \
            --exclude "includes/class-pstrc-updater.php"
      
      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: false
          source-dir: build/wporg-tmp  # katalog z już przygotowaną paczką bez updatera
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: primestep-vehicle-reservation-calculator

      - name: Build plugin zip
        run: |
          mkdir -p build
          zip -r build/pstrc_reservation.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "src/*" \
            --exclude "*.gitignore" \
            --exclude "tailwind.config.js" \
            --exclude "package*.json" \
            --exclude "build/*" \
            --exclude "CLAUDE.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/pstrc_reservation.zip
            build/pstrc_reservation-wporg.zip
          name: "Release v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          body: |
            ## Co nowego w v${{ steps.version.outputs.VERSION }}
            ${{ steps.changelog.outputs.CONTENT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to updates server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: build/pstrc_reservation.zip
          target: public_html/updates/
      
      - name: Update version on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' ~/public_html/updates/update-info.php
            sed -i 's/"last_updated": ".*"/"last_updated": "$(date +%Y-%m-%d)"/' ~/public_html/updates/update-info.php
            sed -i "s|'changelog'.*=>.*'.*'|'changelog' => '<h4>${{ steps.version.outputs.VERSION }}<\/h4><ul><li>${{ steps.changelog.outputs.CONTENT }}<\/li><\/ul>'|" ~/public_html/updates/update-info.php
